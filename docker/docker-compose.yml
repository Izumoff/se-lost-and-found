#web:
  image: python:3.11-slim
  container_name: lost-n-found-web
  restart: unless-stopped
  working_dir: /app
  depends_on:
    mysql:
      condition: service_healthy
  environment:
    APP_BUILD: ${APP_BUILD:-docker}
  volumes:
    - .:/app
    - ${SECRETS_FILE}:/app/Lost_n_Found/secrets.py:ro
    - static_data:/app/staticfiles
  ports:
    - "8000:8000"
  command: >
    sh -c "
    apt-get update &&
    apt-get install -y build-essential default-libmysqlclient-dev pkg-config &&
    python -m pip install --upgrade pip setuptools wheel &&
    python -m pip install -r unix_requirements.txt &&
    python -m pip install uwsgi &&
    python manage.py migrate &&
    python manage.py collectstatic --noinput &&
    uwsgi --http 0.0.0.0:8000 --module Lost_n_Found.wsgi:application --master --processes 4 --threads 2
    "