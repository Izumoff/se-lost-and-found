<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-default">
  <div class="container">
    <div class="navbar-header">
      <a class="navbar-brand" href="home-page.html">Lost & Found</a>
    </div>
    <ul class="nav navbar-nav">
      <li><a href="home-page.html">Home</a></li>
      <li><a href="user-page.html">Your Items</a></li>
      <li><a href="admin-page.html">Admin</a></li>
    </ul>
    <ul class="nav navbar-nav navbar-right">
      <li class="active"><a href="login-form.html">Login</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Login</h1>
  </div>

  <div class="row">
    <div class="col-sm-6">
      <form action="user-page.html" method="get">
        <div class="form-group">
          <label for="login">Login</label>
          <input class="form-control" type="text" id="login" name="login">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password">
        </div>

        <button class="btn btn-primary" type="submit">Login</button>
        <a class="btn btn-default" href="home-page.html">Cancel</a>
      </form>

      <hr>

      <p>
        <a href="forgot-password.html">Forgot my password</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
</body>
</html>
