<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Lost & Found - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Campus Lost &amp; Found</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="create-report.html">Create Report</a></li>
          <li class="nav-item"><a class="nav-link" href="my-reports.html">My Reports</a></li>
          <li class="nav-item"><a class="nav-link" href="report-status.html">Report Status</a></li>
          <li class="nav-item"><a class="nav-link" href="staff-review.html">Staff Review</a></li>
          <li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h1 class="h4 mb-0">Login</h1>
            </div>
            <div class="card-body">
              <form>
                <div class="mb-3">
                  <label for="username" class="form-label">Username or Email</label>
                  <input type="text" class="form-control" id="username" placeholder="Enter username or email">
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" placeholder="Enter password">
                </div>

                <div class="mb-3">
                  <label for="role" class="form-label">Role</label>
                  <select class="form-select" id="role">
                    <option selected>Campus Community User</option>
                    <option>Security Office Staff</option>
                  </select>
                </div>

                <div class="d-grid gap-2">
                  <a href="index.html" class="btn btn-primary">Log In</a>
                  <a href="index.html" class="btn btn-outline-secondary">Cancel</a>
                </div>
              </form>
            </div>
            <div class="card-footer bg-white">
              <div class="alert alert-warning mb-0">
                Example message: Invalid credentials. Please try again.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-white border-top">
    <div class="container text-secondary small">Campus Lost &amp; Found Prototype - Sprint 1</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
