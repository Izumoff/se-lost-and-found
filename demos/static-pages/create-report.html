<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Lost & Found - Create Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Campus Lost &amp; Found</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="create-report.html">Create Report</a></li>
          <li class="nav-item"><a class="nav-link" href="my-reports.html">My Reports</a></li>
          <li class="nav-item"><a class="nav-link" href="report-status.html">Report Status</a></li>
          <li class="nav-item"><a class="nav-link" href="staff-review.html">Staff Review</a></li>
          <li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h1 class="h4 mb-0">Create Lost Item Report</h1>
        </div>
        <div class="card-body">
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="itemName" class="form-label">Item Name</label>
                <input type="text" class="form-control" id="itemName" placeholder="Wallet, keys, phone">
              </div>

              <div class="col-md-6">
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="category">
                  <option selected>Select category</option>
                  <option>Electronics</option>
                  <option>ID / Wallet</option>
                  <option>Keys</option>
                  <option>Clothing</option>
                  <option>Books</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="dateLost" class="form-label">Date Lost</label>
                <input type="date" class="form-control" id="dateLost">
              </div>

              <div class="col-md-6">
                <label for="locationLost" class="form-label">Location Lost</label>
                <input type="text" class="form-control" id="locationLost" placeholder="Building, room, area">
              </div>

              <div class="col-md-6">
                <label for="contactPhone" class="form-label">Contact Phone</label>
                <input type="text" class="form-control" id="contactPhone" placeholder="(910) 555-1234">
              </div>

              <div class="col-md-6">
                <label for="contactEmail" class="form-label">Contact Email</label>
                <input type="email" class="form-control" id="contactEmail" placeholder="name@example.edu">
              </div>

              <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="4" placeholder="Describe the item and its unique details"></textarea>
              </div>

              <div class="col-12">
                <label for="attachment" class="form-label">Optional Attachment</label>
                <input type="file" class="form-control" id="attachment">
              </div>

              <div class="col-12 d-flex gap-2">
                <a href="my-reports.html" class="btn btn-primary">Submit Report</a>
                <button type="reset" class="btn btn-outline-secondary">Clear Form</button>
              </div>
            </div>
          </form>
        </div>
        <div class="card-footer bg-white">
          <div class="alert alert-success mb-0">
            Example message: Report submitted successfully.
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-white border-top">
    <div class="container text-secondary small">Campus Lost &amp; Found Prototype - Sprint 1</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
